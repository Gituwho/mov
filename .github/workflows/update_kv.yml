name: Auto Update Movie KV
on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch:    # Allows manual testing

jobs:
  scrape_and_sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Scrape
        id: scrape_step
        run: |
          DATA=$(node index.js)
          echo "JSON_DATA=$DATA" >> $GITHUB_ENV
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      - name: Update Cloudflare KV
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          # This command pushes the list to your KV key "latest_movies"
          command: kv:key put --namespace-id=${{ secrets.CF_KV_NAMESPACE_ID }} "latest_movies" "$JSON_DATA"
