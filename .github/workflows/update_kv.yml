name: Auto Update Movie KV

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch:    # Allows manual testing

jobs:
  scrape_and_sync:
    runs-on: ubuntu-latest
    
    # This environment variable stops the deprecation warnings
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Scrape Movie Data
        run: |
          # Run the scraper and save to a file to handle large data safely
          node index.js > movies.json
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Update Cloudflare KV
        run: |
          # Use quotes around the ID and ensure the path is at the very end
          # This syntax is compatible with the latest Wrangler v4
          npx wrangler kv:key put "latest_movies" --namespace-id="${{ secrets.CF_KV_NAMESPACE_ID }}" --path movies.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
