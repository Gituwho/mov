name: Auto Update Movie KV

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  scrape_and_sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Scrape Movie Data
        run: node index.js > movies.json
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Update Cloudflare KV
        run: |
          # With wrangler.toml, we don't need to pass the namespace ID here
          npx wrangler kv:key put --binding=TAMIL_SOLAI_KV "latest_movies" --path movies.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
