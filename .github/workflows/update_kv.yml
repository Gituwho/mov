- name: Scrape
        run: node index.js > movies.json
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Update Cloudflare KV
        run: npx wrangler kv:key put --namespace-id=${{ secrets.CF_KV_NAMESPACE_ID }} "latest_movies" --path movies.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
