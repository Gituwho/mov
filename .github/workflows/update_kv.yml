name: Auto Update Movie KV

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight
  workflow_dispatch:    # Allows you to click "Run workflow" manually

jobs:
  scrape_and_sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Scrape Movie Data
        run: |
          # This runs your scraper and saves the list to a file
          node index.js > movies.json
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Update Cloudflare KV
        run: |
          # Standardized Wrangler v4 command
          # Using --path ensures the entire file is uploaded correctly
          npx wrangler kv:key put --namespace-id="${{ secrets.CF_KV_NAMESPACE_ID }}" "latest_movies" --path movies.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
